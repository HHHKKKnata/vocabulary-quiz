<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>単語カード発音テスト</title>
    <style>
        .word-card {
            display: inline-block;
            padding: 15px 25px;
            margin: 10px;
            font-size: 24px;
            font-family: Arial, sans-serif;
            border: 2px solid #333;
            border-radius: 8px;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.2s;
        }
        .word-card:active {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>

    <h1>タップして発音を聴く</h1>
    
    <div class="word-card" data-lang="en-US">apple</div>
    <div class="word-card" data-lang="en-US">beautiful</div>
    <div class="word-card" data-lang="en-GB">schedule</div> <script>
        // すべての単語カードにクリック（タップ）イベントを設定
        document.querySelectorAll('.word-card').forEach(card => {
            card.addEventListener('click', () => {
                const text = card.textContent;
                const lang = card.getAttribute('data-lang') || 'en-US';
                speak(text, lang);
            });
        });

        // 読み上げを実行する関数
        document.querySelectorAll('.word-card').forEach(card => {
    card.addEventListener('click', () => {
        const text = card.textContent;
        const lang = card.getAttribute('data-lang') || 'en-US';
        speak(text, lang);
    });
});

function speak(text, lang) {
    if (speechSynthesis.speaking) {
        speechSynthesis.cancel();
    }

    // iOS対策の空再生
    speechSynthesis.speak(new SpeechSynthesisUtterance(''));

    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = lang;
    utterance.rate = 1.0;
    utterance.pitch = 1.0;

    // 💡【重要】端末の音声リストから、指定した言語（en-USなど）に合うネイティブ音声を割り当てる
    const voices = speechSynthesis.getVoices();
    
    // 指定された言語コード（例: "en-US"）を含む音声を探す
    // 見つからない場合は、前方一致で "en-"（英語圏全般）を探す
    let targetVoice = voices.find(v => v.lang === lang) || 
                      voices.find(v => v.lang.startsWith(lang.split('-')[0]));

    if (targetVoice) {
        utterance.voice = targetVoice; // ネイティブ音声をセット！
    }

    speechSynthesis.speak(utterance);
}

// 💡 iOS/Chrome対策：音声リストがバックグラウンドで読み込まれるのを待つためのイベント
if (typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = () => {
        speechSynthesis.getVoices();
    };
}
    </script>
</body>
</html>
