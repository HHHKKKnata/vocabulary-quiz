<script>
    // ==========================================
    // 🛠️ お父様の設定エリア
    // ==========================================
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyRdyBForEEMa92JJYxMteVrtxSa1oh7AM9pQyLkArgbeCZ_-IqRJual2ItiX4Junyarg/exec";
    const SUBJECT_NAME = "英語";
    const PAGE_NAME = "Unit2単語_1to14"; // ポータル表示用に少し変更しました
    // ==========================================

    // 14問分の送信ロック管理
    let submissionLocks = {};
    for (let i = 1; i <= 14; i++) {
        submissionLocks[`q${i}`] = false;
    }

    function selectChoice(quizId, choiceNum, isCorrect) {
        if (submissionLocks[quizId]) return;
        submissionLocks[quizId] = true;

        const card = document.getElementById(`card-${quizId}`);
        const badge = document.getElementById(`badge-${quizId}`);
        const targetBtn = document.getElementById(`btn-${quizId}-${choiceNum}`);
        
        for (let i = 1; i <= 4; i++) {
            document.getElementById(`btn-${quizId}-${i}`).classList.add('disabled');
        }

        let resultStatus = isCorrect ? "正解" : "不正解";

        if (isCorrect) {
            card.classList.add('status-correct');
            targetBtn.classList.add('is-correct-choice');
            if (badge) {
                badge.innerText = "✨ 正解！送信中...";
                badge.style.background = "#d1fae5"; badge.style.color = "#065f46";
            }
        } else {
            card.classList.add('status-incorrect');
            targetBtn.classList.add('is-wrong-choice');
            if (badge) {
                badge.innerText = "❌ 不正解...送信中...";
                badge.style.background = "#fee2e2"; badge.style.color = "#991b1b";
            }
        }

        const payload = {
            subject_id: SUBJECT_NAME,
            page_id: PAGE_NAME,
            quiz_id: quizId,
            full_quiz_id: `${SUBJECT_NAME}.${PAGE_NAME}.${quizId}`,
            status: resultStatus,
            timestamp: new Date().toISOString()
        };

        fetch(WEB_APP_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        })
        .then(() => {
            if (badge) {
                badge.innerText = isCorrect ? "✨ 正解！(記録完了)" : "❌ 不正解(記録完了)";
            }
        })
        .catch(err => {
            console.error("通信失敗:", err);
            if (badge) {
                badge.innerText = "⚠️ 送信失敗・再試行可";
                badge.style.background = "#fef9e7"; badge.style.color = "#f39c12";
            }
            submissionLocks[quizId] = false;
            for (let i = 1; i <= 4; i++) {
                document.getElementById(`btn-${quizId}-${i}`).classList.remove('disabled');
            }
            targetBtn.classList.remove('is-correct-choice', 'is-wrong-choice');
            card.classList.remove('status-correct', 'status-incorrect');
        });
    }

    function resetQuizCard(quizId) {
        submissionLocks[quizId] = false;
        const card = document.getElementById(`card-${quizId}`);
        const badge = document.getElementById(`badge-${quizId}`);

        if (card) card.className = "quiz-card";
        if (badge) {
            badge.innerText = "未解答";
            badge.style.background = "#e2e8f0"; badge.style.color = "#4a5568";
        }

        for (let i = 1; i <= 4; i++) {
            const btn = document.getElementById(`btn-${quizId}-${i}`);
            btn.classList.remove('disabled', 'is-correct-choice', 'is-wrong-choice');
        }
    }
</script>
