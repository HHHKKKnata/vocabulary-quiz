<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room★ Words Portal</title>
    <style>
        /* 🌌 サイバーデザインのCSSを完全移植 */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=M+PLUS+Rounded+1c:wght@400;700&display=swap');

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: #0f172a; /* 宇宙をイメージしたディープネイビー */
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            background-position: 0 0, 40px 60px;
            color: #f1f5f9;
            margin: 0;
            padding: 20px;
        }
        
        .container {
            max-width: 550px;
            margin: 40px auto;
            background: rgba(30, 41, 59, 0.7); /* 半透明のサイバーパネル風 */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 30px 25px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(59, 130, 246, 0.2);
            border: 2px solid #3b82f6; /* エレクトリックブルーのフレーム */
            box-sizing: border-box;
        }
        
        .title-box {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }
        
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: #06b6d4; /* ルミナスシアン */
            text-shadow: 0 0 12px rgba(6, 182, 212, 0.6);
            margin: 0;
            letter-spacing: 2px;
        }
        
        .subtitle {
            font-size: 0.95rem;
            color: #94a3b8;
            margin: 8px 0 0 0;
            font-weight: bold;
            letter-spacing: 0.05em;
        }
        
        .search-container {
            margin-bottom: 25px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px;
            font-size: 1rem;
            font-family: inherit;
            font-weight: bold;
            border: 2px solid #334155;
            border-radius: 14px;
            background-color: #1e293b;
            color: #ffffff;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        .search-input:focus {
            outline: none;
            border-color: #06b6d4;
            box-shadow: 0 0 12px rgba(6, 182, 212, 0.4);
            background-color: #0f172a;
        }
        .search-input::placeholder {
            color: #64748b;
        }
        
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        li {
            margin-bottom: 14px;
        }
        
        a {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid #475569;
            border-radius: 16px;
            color: #f1f5f9;
            text-decoration: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
            transition: all 0.2s ease;
        }
        
        /* タップ・ホバー時のエフェクト */
        a:hover, a:active {
            transform: scale(0.98);
            border-color: #3b82f6;
            background: #1e293b;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }
        
        .subject-badge {
            background-color: #3b82f6; /* エレクトリックブルー */
            color: #ffffff;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 8px;
            margin-right: 8px;
            display: inline-block;
            vertical-align: middle;
        }
        
        /* 「pバッジ」の代わりに「Unitネオンバッジ」化 */
        .page-badge {
            background-color: #06b6d4; /* シアン */
            color: #0f172a;
            font-size: 0.75rem;
            font-weight: 900;
            padding: 4px 10px;
            border-radius: 8px;
            margin-right: 8px;
            display: inline-block;
            vertical-align: middle;
            box-shadow: 0 0 8px rgba(6, 182, 212, 0.5);
        }
        
        .ticket-title {
            font-weight: bold;
            font-size: 0.95rem;
            vertical-align: middle;
            color: #e2e8f0;
        }
        
        .arrow {
            color: #06b6d4;
            font-weight: bold;
            font-size: 0.9rem;
            transition: transform 0.2s;
            text-shadow: 0 0 6px rgba(6, 182, 212, 0.5);
        }
        a:hover .arrow {
            transform: translateX(4px);
        }
        
        .loading {
            text-align: center;
            padding: 30px;
            font-weight: bold;
            color: #94a3b8;
            font-size: 0.95rem;
        }
        .error {
            text-align: center;
            background: #f43f5e;
            color: white;
            padding: 15px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title-box">
        <h1>WORD MISSION</h1>
        <p class="subtitle">🚀 クイズ Room★ 用語トレーニング</p>
    </div>
    
    <div class="search-container">
        <input type="text" id="search-bar" class="search-input" placeholder="キーワード・Unit番号で検索...">
    </div>
    
    <div id="loading" class="loading">🛰️ ターゲット単語をスキャン中...</div>
    <ul id="link-list"></ul>
</div>

<script>
    // ==========================================
    // 🛠️ お父様の設定エリア（確実に動いている設定を記述）
    // ==========================================
    const GITHUB_USER = "HHHKKKnata";  // お父様のユーザー名
    const GITHUB_REPO = "vocabulary-quiz"; // 単語用のリポジトリ名
    
    // 単語を格納しているフォルダを設定（ルート直下なら空文字 ''、フォルダ内なら 'english' 等）
    const SUBJECTS = [
        { id: '', name: '英語' } 
    ];
    // ==========================================

    let allPages = [];

    async function loadAllPages() {
        const listElement = document.getElementById('link-list');
        const loadingElement = document.getElementById('loading');
        
        try {
            // index_v4.html と全く同じ通信ロジック
            const fetchPromises = SUBJECTS.map(async (subj) => {
                // サブフォルダがある場合とルート直下の場合でURLを切り替え
                const pathSuffix = subj.id ? `/${subj.id}` : '';
                const apiUrl = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents${pathSuffix}`;
                
                const response = await fetch(apiUrl);
                if (!response.ok) return [];
                
                const files = await response.json();
                
                return files
                    .map(file => {
                        // htmlファイルのみ抽出し、index.htmlは除外
                        if (!file.name.endsWith('.html') || file.name === 'index.html') return null;

                        // 日本語ファイル名をデコード
                        const decodedName = decodeURIComponent(file.name);
                        
                        // index_v4 と同じ正規表現で「数字」と「タイトル」を分離
                        const match = decodedName.match(/^(p?)(\d+)-?(.*?)\.html$/);
                        if (!match) return null;

                        const pageNum = match[2];
                        let titleText = match[3] || "";

                        if (!titleText) {
                            titleText = "トレーニングを開く";
                        }

                        // 各ファイルのリンク先パスを生成
                        const linkPath = subj.id ? `${subj.id}/${file.name}` : file.name;

                        return {
                            fileName: file.name,
                            pageNum: pageNum,
                            titleText: titleText,
                            path: linkPath,
                            subjectName: subj.name
                        };
                    })
                    .filter(page => page !== null);
            });

            const results = await Promise.all(fetchPromises);
            allPages = results.flat();

            // ユニット（ページ）番号順に並べ替え
            allPages.sort((a, b) => parseInt(a.pageNum, 10) - parseInt(b.pageNum, 10));

            loadingElement.style.display = 'none';
            renderList(allPages);

            // 🔍 リアルタイム検索（index_v4のロジックそのまま、「unit」でも引っかかるよう配慮）
            document.getElementById('search-bar').addEventListener('input', (e) => {
                const keyword = e.target.value.toLowerCase().trim();
                
                const filtered = allPages.filter(page => {
                    return page.subjectName.toLowerCase().includes(keyword) || 
                           page.titleText.toLowerCase().includes(keyword) ||
                           page.pageNum.includes(keyword) ||
                           `unit${page.pageNum}`.includes(keyword) ||
                           `u${page.pageNum}`.includes(keyword);
                });
                
                renderList(filtered);
            });

        } catch (error) {
            loadingElement.style.display = 'none';
            listElement.innerHTML = `<li class="error">⚠️ データ取得エラー: ${error.message}</li>`;
        }
    }

    function renderList(pages) {
        const listElement = document.getElementById('link-list');
        listElement.innerHTML = '';

        if (pages.length === 0) {
            listElement.innerHTML = `<li class="loading">🎁 該当するミッションが見つかりません。</li>`;
            return;
        }

        pages.forEach(page => {
            const li = document.createElement('li');
            const a = document.createElement('a');
            
            // バッジの表記を「p.」から「Unit.」へ変更
            a.innerHTML = `
                <span>
                    <span class="subject-badge">${page.subjectName}</span>
                    <span class="page-badge">Unit.${page.pageNum}</span>
                    <span class="ticket-title">${page.titleText}</span>
                </span>
                <span class="arrow">LAUNCH ▶</span>
            `;
            
            a.href = `./${page.path}`;
            
            li.appendChild(a);
            listElement.appendChild(li);
        });
    }

    loadAllPages();
</script>

</body>
</html>
