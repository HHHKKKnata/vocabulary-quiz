<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room★ Words Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=M+PLUS+Rounded+1c:wght@400;700&display=swap');

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: #0f172a; /* 宇宙をイメージしたディープネイビー */
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            background-position: 0 0, 40px 60px;
            color: #f1f5f9;
            margin: 0;
            padding: 20px;
        }
        
        .container {
            max-width: 550px;
            margin: 40px auto;
            background: rgba(30, 41, 59, 0.7); /* 半透明のサイバーパネル風 */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 30px 25px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(59, 130, 246, 0.2);
            border: 2px solid #3b82f6; /* エレクトリックブルーのフレーム */
            box-sizing: border-box;
        }
        
        /* サイバー感のある近未来ヘッダー */
        .header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }
        
        .header-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: #06b6d4; /* ルミナスシアン */
            text-shadow: 0 0 12px rgba(6, 182, 212, 0.6);
            margin: 0;
            letter-spacing: 2px;
        }
        
        .header-subtitle {
            font-size: 0.95rem;
            color: #94a3b8;
            margin: 8px 0 0 0;
            font-weight: bold;
            letter-spacing: 0.05em;
        }
        
        /* 検索ボックスもネオン風に */
        .search-box {
            width: 100%;
            padding: 14px 20px;
            font-size: 1rem;
            font-family: inherit;
            font-weight: bold;
            border: 2px solid #334155;
            border-radius: 14px;
            background-color: #1e293b;
            color: #ffffff;
            box-sizing: border-box;
            transition: all 0.3s ease;
            margin-bottom: 25px;
        }
        .search-box:focus {
            outline: none;
            border-color: #06b6d4;
            box-shadow: 0 0 12px rgba(6, 182, 212, 0.4);
            background-color: #0f172a;
        }
        .search-box::placeholder {
            color: #64748b;
        }
        
        /* ミッションリスト */
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        li {
            margin-bottom: 14px;
        }
        
        /* チケットリンク（サイバースペース仕様） */
        li a {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid #475569;
            border-radius: 16px;
            color: #f1f5f9;
            text-decoration: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
            transition: all 0.2s ease;
        }
        
        /* スマホ用タップエフェクト */
        li a:active {
            transform: scale(0.98);
            border-color: #3b82f6;
            background: #1e293b;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }
        
        /* バッジスタイル */
        .subject-badge {
            background-color: #3b82f6; /* 青 */
            color: #ffffff;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 8px;
            margin-right: 8px;
            display: inline-block;
            vertical-align: middle;
        }
        
        /* ページバッジ（通常） */
        .page-badge {
            background-color: #475569;
            color: #cbd5e1;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 8px;
            margin-right: 8px;
            display: inline-block;
            vertical-align: middle;
        }
        
        /* 単語Unit専用バッジ（シアンネオン） */
        .unit-badge {
            background-color: #06b6d4;
            color: #0f172a;
            font-size: 0.75rem;
            font-weight: 900;
            padding: 4px 10px;
            border-radius: 8px;
            margin-right: 8px;
            display: inline-block;
            vertical-align: middle;
            box-shadow: 0 0 8px rgba(6, 182, 212, 0.5);
        }
        
        .ticket-title {
            font-weight: bold;
            font-size: 0.95rem;
            vertical-align: middle;
            color: #e2e8f0;
        }
        
        .arrow {
            color: #06b6d4;
            font-weight: bold;
            font-size: 0.9rem;
            transition: transform 0.2s;
            text-shadow: 0 0 6px rgba(6, 182, 212, 0.5);
        }
        
        /* ローディング・エラー */
        .loading, .error {
            text-align: center;
            padding: 30px;
            font-weight: bold;
            color: #94a3b8;
            font-size: 0.95rem;
        }
        .error {
            color: #f43f5e;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 class="header-logo">WORD MISSION</h1>
        <p class="header-subtitle">🚀 クイズ Room★ 用語トレーニング</p>
    </div>

    <input type="text" id="search-input" class="search-box" placeholder="キーワード・Unit番号で検索..." autocomplete="off">

    <ul id="link-list">
        <li class="loading">🛰️ ターゲット単語をスキャン中...</li>
    </ul>
</div>

<script>
    // ==========================================
    // 🛠️ お父様の設定エリア
    // ==========================================
    const repoOwner = "HHHKKKnata"; 
    const repoName = "vocabulary-quiz";   
    // ==========================================

    const apiUrl = `https://api.github.com/repos/${repoOwner}/${repoName}/contents/`;
    let allPages = [];

    async function loadAllPages() {
        const listElement = document.getElementById('link-list');
        
        try {
            const response = await fetch(apiUrl);
            if (!response.ok) throw new Error('リポジトリの接続に失敗しました。設定エリアのユーザー名やリポジトリ名が正しいかご確認ください。');
            const files = await response.json();

            // htmlファイルのみ抽出し、ファイル名から情報を判定（中身のフェッチはしないので爆速）
            allPages = files
                .filter(file => file.name.endsWith('.html') && file.name !== 'index.html')
                .map(file => {
                    const decodedName = decodeURIComponent(file.name);
                    
                    // 【判別ルール】
                    // 例①: "Unit2-1-新出単語.html" や "Unit2_1_xxx.html"
                    // 例②: "p55-単語.html" や "55単語.html"
                    let type = 'page';
                    let displayNum = '';
                    let titleText = '';
                    let sortKey = 0; // ソート用の数値

                    if (/Unit/i.test(decodedName)) {
                        type = 'unit';
                        // Unitの数字と、後ろに続く枝番（あれば）を抽出
                        const unitMatch = decodedName.match(/Unit\s*(\d+)(?:[-_](\d+))?/i);
                        const mainNum = unitMatch ? unitMatch[1] : '0';
                        const subNum = unitMatch && unitMatch[2] ? `-${unitMatch[2]}` : '';
                        displayNum = `${mainNum}${subNum}`;
                        
                        // ソート用に数値を計算 (例: Unit2-1 -> 201, Unit12-3 -> 1203)
                        sortKey = (parseInt(mainNum, 10) * 100) + (unitMatch && unitMatch[2] ? parseInt(unitMatch[2], 10) : 0);

                        // タイトル文字列の整形（「UnitX-X」や「.html」を取り除く）
                        titleText = decodedName.replace(/Unit\s*\d+[-_]?\d*[-_]?/i, '').replace('.html', '').trim();
                        if (!titleText) titleText = "新出単語マスター";
                    } else {
                        // 通常のページ番号の場合
                        type = 'page';
                        const pageMatch = decodedName.match(/^(p?)(\d+)/i);
                        const pageNum = pageMatch ? pageMatch[2] : '0';
                        displayNum = pageNum;
                        sortKey = parseInt(pageNum, 10);

                        titleText = decodedName.replace(/^(p?)(\d+)[-_]?/i, '').replace('.html', '').trim();
                        if (!titleText) titleText = "用語トレーニング";
                    }

                    return {
                        path: file.name,
                        subjectName: "英語", // 単語リポジトリなので「英語」固定、必要に応じて変更可
                        type: type,
                        displayNum: displayNum,
                        titleText: titleText,
                        sortKey: sortKey
                    };
                });

            // ユニット番号/ページ番号の順に正しくソート
            allPages.sort((a, b) => a.sortKey - b.sortKey);

            // リスト表示
            renderList(allPages);

            // 🔍 リアルタイム検索
            const searchInput = document.getElementById('search-input');
            searchInput.addEventListener('input', (e) => {
                const keyword = e.target.value.toLowerCase().trim();
                
                const filtered = allPages.filter(page => {
                    return page.titleText.toLowerCase().includes(keyword) || 
                           page.displayNum.toLowerCase().includes(keyword) ||
                           `unit.${page.displayNum}`.toLowerCase().includes(keyword) ||
                           `p.${page.displayNum}`.toLowerCase().includes(keyword);
                });
                
                renderList(filtered);
            });

        } catch (error) {
            listElement.innerHTML = `<li class="error">⚠️ データ同期エラー: ${error.message}</li>`;
        }
    }

    function renderList(pages) {
        const listElement = document.getElementById('link-list');
        listElement.innerHTML = '';

        if (pages.length === 0) {
            listElement.innerHTML = `<li class="loading">🎁 該当するミッションが見つかりません。</li>`;
            return;
        }

        pages.forEach(page => {
            const li = document.createElement('li');
            const a = document.createElement('a');
            
            const badgeHtml = page.type === 'unit' 
                ? `<span class="unit-badge">Unit.${page.displayNum}</span>`
                : `<span class="page-badge">p.${page.displayNum}</span>`;

            a.innerHTML = `
                <span>
                    <span class="subject-badge">${page.subjectName}</span>
                    ${badgeHtml}
                    <span class="ticket-title">${page.titleText}</span>
                </span>
                <span class="arrow">LAUNCH ▶</span>
            `;
            
            a.href = `./${page.path}`;
            
            li.appendChild(a);
            listElement.appendChild(li);
        });
    }

    loadAllPages();
</script>

</body>
</html>
