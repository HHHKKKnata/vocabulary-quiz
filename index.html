<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room★ Words Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=M+PLUS+Rounded+1c:wght@400;700&display=swap');

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: #0f172a;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            background-position: 0 0, 40px 60px;
            color: #f1f5f9;
            margin: 0;
            padding: 20px;
        }
        
        .container {
            max-width: 550px;
            margin: 40px auto;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 30px 25px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(59, 130, 246, 0.2);
            border: 2px solid #3b82f6;
            box-sizing: border-box;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }
        
        .header-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: #06b6d4;
            text-shadow: 0 0 12px rgba(6, 182, 212, 0.6);
            margin: 0;
            letter-spacing: 2px;
        }
        
        .header-subtitle {
            font-size: 0.95rem;
            color: #94a3b8;
            margin: 8px 0 0 0;
            font-weight: bold;
            letter-spacing: 0.05em;
        }
        
        .search-box {
            width: 100%;
            padding: 14px 20px;
            font-size: 1rem;
            font-family: inherit;
            font-weight: bold;
            border: 2px solid #334155;
            border-radius: 14px;
            background-color: #1e293b;
            color: #ffffff;
            box-sizing: border-box;
            transition: all 0.3s ease;
            margin-bottom: 25px;
        }
        .search-box:focus {
            outline: none;
            border-color: #06b6d4;
            box-shadow: 0 0 12px rgba(6, 182, 212, 0.4);
            background-color: #0f172a;
        }
        .search-box::placeholder {
            color: #64748b;
        }
        
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        li {
            margin-bottom: 14px;
        }
        
        li a {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid #475569;
            border-radius: 16px;
            color: #f1f5f9;
            text-decoration: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
            transition: all 0.2s ease;
        }
        
        li a:active {
            transform: scale(0.98);
            border-color: #3b82f6;
            background: #1e293b;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }
        
        .subject-badge {
            background-color: #3b82f6;
            color: #ffffff;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 8px;
            margin-right: 8px;
            display: inline-block;
            vertical-align: middle;
        }
        
        .unit-badge {
            background-color: #06b6d4;
            color: #0f172a;
            font-size: 0.75rem;
            font-weight: 900;
            padding: 4px 10px;
            border-radius: 8px;
            margin-right: 8px;
            display: inline-block;
            vertical-align: middle;
            box-shadow: 0 0 8px rgba(6, 182, 212, 0.5);
        }
        
        .ticket-title {
            font-weight: bold;
            font-size: 0.95rem;
            vertical-align: middle;
            color: #e2e8f0;
        }
        
        .arrow {
            color: #06b6d4;
            font-weight: bold;
            font-size: 0.9rem;
            transition: transform 0.2s;
            text-shadow: 0 0 6px rgba(6, 182, 212, 0.5);
        }
        
        .loading, .error {
            text-align: center;
            padding: 30px;
            font-weight: bold;
            color: #94a3b8;
            font-size: 0.95rem;
        }
        .error {
            color: #f43f5e;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 class="header-logo">WORD MISSION</h1>
        <p class="header-subtitle">🚀 英語 Room★ 単語トレーニング</p>
    </div>

    <input type="text" id="search-input" class="search-box" placeholder="キーワードでミッションを検索..." autocomplete="off">

    <ul id="link-list">
        <li class="loading">🛰️ ターゲット単語をスキャン中...</li>
    </ul>
</div>

<script>
    // ==========================================
    // 🛠️ お父様の設定エリア
    // ==========================================
    const repoOwner = "HHHKKKnata"; 
    const repoName = "vocabulary-quiz";
    // ==========================================

    const apiUrl = `https://api.github.com/repos/${repoOwner}/${repoName}/contents/`;
    let allPages = [];

    async function loadAllPages() {
        const listElement = document.getElementById('link-list');
        const loadingElement = listElement.querySelector('.loading');

        try {
            const response = await fetch(apiUrl);
            if (!response.ok) throw new Error('リポジトリの接続に失敗しました');
            const files = await response.json();

            // 🌟 日本語ファイル名（エンコード済）も安全にキャッチできるように修正
            const htmlFiles = files.filter(file => {
                const decodedName = decodeURIComponent(file.name).toLowerCase();
                return decodedName.endsWith('.html') && decodedName !== 'index.html';
            });

            const fetchPromises = htmlFiles.map(async (file) => {
                try {
                    // 🌟 日本語URLを正しくデコードしてフェッチ
                    const targetUrl = file.download_url;
                    const fileRes = await fetch(targetUrl);
                    const text = await fileRes.text();

                    // ① <title>タグ内の文字列を抽出
                    const titleMatch = text.match(/<title>([\s\S]*?)<\/title>/i);
                    let fullTitle = titleMatch ? titleMatch[1].trim() : decodeURIComponent(file.name);

                    // ② SUBJECT_NAME の値を抽出
                    const subjectMatch = text.match(/const\s+SUBJECT_NAME\s*=\s*["'](.*?)["']/);
                    const subjectName = subjectMatch ? subjectMatch[1] : "英語";

                    // ③ PAGE_NAME の値を抽出
                    const pageMatch = text.match(/const\s+PAGE_NAME\s*=\s*["'](.*?)["']/);
                    const pageName = pageMatch ? pageMatch[1] : decodeURIComponent(file.name).replace('.html', '');

                    // バッジ番号の抽出（数字をハイフンで繋ぐ）
                    let displayNum = "2-1"; 
                    const numExtract = pageName.match(/\d+/g);
                    if (numExtract && numExtract.length >= 1) {
                        displayNum = numExtract.join('-');
                    }

                    // 表示用タイトルから不要文字をカット
                    let titleText = fullTitle.replace(/^.*Room★\s*/i, '').trim();
                    if (!titleText) titleText = pageName;

                    return {
                        path: file.name,
                        subjectName: subjectName,
                        pageName: pageName,
                        displayNum: displayNum,
                        titleText: titleText
                    };
                } catch (innerError) {
                    console.error("ファイル解析スキップ:", file.name, innerError);
                    const safeName = decodeURIComponent(file.name).replace('.html', '');
                    return {
                        path: file.name,
                        subjectName: "英語",
                        pageName: safeName,
                        displayNum: "NEW",
                        titleText: safeName
                    };
                }
            });

            allPages = await Promise.all(fetchPromises);

            // 並び替え
            allPages.sort((a, b) => {
                return a.pageName.localeCompare(b.pageName, undefined, {numeric: true, sensitivity: 'base'});
            });

            renderList(allPages);

            // 検索機能
            const searchInput = document.getElementById('search-input');
            searchInput.addEventListener('input', (e) => {
                const keyword = e.target.value.toLowerCase().trim();
                const filtered = allPages.filter(page => {
                    return page.titleText.toLowerCase().includes(keyword) || 
                           page.pageName.toLowerCase().includes(keyword) ||
                           page.subjectName.toLowerCase().includes(keyword);
                });
                renderList(filtered);
            });

        } catch (error) {
            if (loadingElement) loadingElement.style.display = 'none';
            listElement.innerHTML = `<li class="error">⚠️ データ同期エラー: ${error.message}</li>`;
        }
    }

    function renderList(pages) {
        const listElement = document.getElementById('link-list');
        listElement.innerHTML = '';

        if (pages.length === 0) {
            listElement.innerHTML = `<li class="loading">🎁 該当するミッションが見つかりません。</li>`;
            return;
        }

        pages.forEach(page => {
            const li = document.createElement('li');
            const a = document.createElement('a');
            
            const badgeHtml = `<span class="unit-badge">Unit.${page.displayNum}</span>`;

            a.innerHTML = `
                <span>
                    <span class="subject-badge">${page.subjectName}</span>
                    ${badgeHtml}
                    <span class="ticket-title">${page.titleText}</span>
                </span>
                <span class="arrow">LAUNCH ▶</span>
            `;
            
            a.href = `./${page.path}`;
            
            li.appendChild(a);
            listElement.appendChild(li);
        });
    }

    loadAllPages();
</script>

</body>
</html>
